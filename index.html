<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赵羽晨 生日快乐 🎂</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            min-height: 100vh;
            background: linear-gradient(135deg, #ff9a9e, #fecfef);
            display: flex; flex-direction: column;
            align-items: center; justify-content: center;
            text-align: center; padding: 20px;
            overflow-x: hidden; font-family: "Microsoft YaHei", sans-serif;
        }
        .balloon {
            position: absolute; width: 50px; height: 70px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            opacity: 0.8; animation: float 6s ease-in-out infinite;
        }
        @keyframes float {
            0% { transform: translateY(100vh); opacity: 0; }
            20%, 80% { opacity: 1; }
            100% { transform: translateY(-100px); opacity: 0; }
        }
        .title { font-size: 32px; color: #d81b60; margin: 20px 0; font-weight: bold; text-shadow: 0 0 10px #fff; }
        .name { font-size: 40px; color: #ff4081; margin: 10px 0; font-weight: bold; }
        .msg { font-size: 18px; color: #333; margin: 15px 0; max-width: 90%; line-height: 1.6; }
        .btn {
            margin-top: 30px; padding: 12px 25px;
            background: #ff4081; color: white; border: none;
            border-radius: 30px; font-size: 16px; cursor: pointer;
            box-shadow: 0 4px 10px rgba(0,0,0,0.2);
        }
    </style>
</head>
<body>
    <audio id="music" loop>
        <source src="https://cdn.freesound.org/previews/504/504382_10644711-lq.mp3" type="audio/mpeg">
    

    <div class="title">祝 🎉</div>
    <div class="name">赵羽晨 同学</div>
    <div class="title">生日快乐 🎂🎁</div>
    
    <div class="msg">
        愿你岁岁常欢愉，年年皆胜意<br>
        平安喜乐，万事顺遂，前程似锦，未来可期✨
    </div>

    <button class="btn" onclick="playMusic()">点击接收祝福 🎈</button>

    <script>
        const colors = ["#ff6b6b", "#4ecdc4", "#45b7d1", "#feca57", "#ff9ff3"];
        function createBalloon() {
            let b = document.createElement("div");
            b.classList.add("balloon");
            b.style.left = Math.random() * 100 + "vw";
            b.style.background = colors[Math.floor(Math.random() * colors.length)];
            b.style.animationDelay = Math.random() * 6 + "s";
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 6000);
        }
        setInterval(createBalloon, 800);

        function playMusic() {
            document.getElementById("music").play();
            alert("祝赵羽晨同学生日快乐！天天开心～🎂");
        }
    </script>
</body>
</html>
