<!DOCTYPE html>
<html lang="zh-CN">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>赵羽晨 生日快乐 🎂</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body {
            width: 100vw;
            height: 100vh;
            background: linear-gradient(to top, #ff9a9e, #fad0c4, #fecfef);
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            text-align: center;
            font-family: "PingFang SC", "Microsoft YaHei", sans-serif;
            overflow: hidden;
            position: relative;
        }
        .title {
            font-size: 36px;
            color: #d81b60;
            font-weight: bold;
            margin: 15px 0;
            text-shadow: 0 0 10px rgba(255,255,255,0.8);
        }
        .name {
            font-size: 44px;
            color: #ff4081;
            font-weight: bold;
            margin: 10px 0;
        }
        .text {
            font-size: 18px;
            color: #333;
            line-height: 1.8;
            margin-top: 20px;
        }
        .balloon {
            position: absolute;
            width: 50px;
            height: 65px;
            border-radius: 50% 50% 50% 50% / 60% 60% 40% 40%;
            bottom: -80px;
            animation: fly 6s linear infinite;
            opacity: 0.8;
        }
        @keyframes fly {
            0% { transform: translateY(0); opacity: 0; }
            10% { opacity: 1; }
            90% { opacity: 1; }
            100% { transform: translateY(-100vh); opacity: 0; }
        }
    </style>
</head>
<body>
    <div class="title">祝</div>
    <div class="name">赵羽晨 同学</div>
    <div class="title">生日快乐 🎂🎈</div>
    <div class="text">
        愿你岁岁常欢愉，年年皆胜意<br>
        平安喜乐，万事顺遂，前程似锦✨
    </div>

    <script>
        const colors = ["#ff6b6b", "#4ecdc4", "#45b7d1", "#feca57", "#ff9ff3", "#ffafcc"];
        function createBalloon() {
            let b = document.createElement("div");
            b.className = "balloon";
            b.style.left = Math.random() * 100 + "vw";
            b.style.background = colors[Math.floor(Math.random() * colors.length)];
            b.style.animationDelay = Math.random() * 6 + "s";
            document.body.appendChild(b);
            setTimeout(() => b.remove(), 6000);
        }
        setInterval(createBalloon, 700);
    </script>
</body>
</html>
